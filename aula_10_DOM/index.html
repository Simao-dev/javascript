<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>

<style>
    div#area{
        font: normal 20pt arial;
        background-color: rgb(173, 11, 65);
        color: white;
        width: 200px;
        height: 200px;
        line-height: 200px;
        border-radius: 10px;
        text-align: center;
        
    }

</style>
<body>
    <div id="area" >
        Interaja...
    </div>
    
    <script>
        var evento = window.document.getElementById("area")

        addEventListener("click", interagir)
        addEventListener("mouseenter", entrar)
        addEventListener("mouseout", sair)
        
        function interagir(){
            evento.style.backgroundColor = "blue"
            evento.innerText = "clicou!"

        }
        function entrar(){ 
            evento.innerText = "Entrou!"
        }

        function sair(){
            evento.style.backgroundColor = "rgb(173, 11, 65)"
            evento.innerText = "Saiu!"
        }

    </script>
</body>
</html>
